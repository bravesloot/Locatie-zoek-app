<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locatie Zoeker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>Locatie Zoeker</h1>
        <p class="subtitle">Ontdek wat er in de buurt is</p>
      </div>

      <!-- ── Mode tabs ─────────────────────────────────── -->
      <div id="mode-tabs">
        <button class="mode-tab active" data-mode="activity">🗺️ Activiteit</button>
        <button class="mode-tab" data-mode="overnight">🌙 Overnachten</button>
      </div>

      <!-- ── Locatie (shared) ──────────────────────────── -->
      <section class="control-section">
        <label class="section-label">Mijn locatie</label>
        <div class="location-row">
          <div class="autocomplete-wrapper">
            <input id="location-input" type="text" placeholder="Typ een adres of stad…" autocomplete="off" />
            <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
          </div>
          <button id="gps-btn" title="Gebruik GPS-locatie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
              <circle cx="12" cy="12" r="9" stroke-dasharray="4 2"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- ── Reistijd (shared, range verschilt per modus) ── -->
      <section class="control-section">
        <label class="section-label">Reistijd: <strong id="time-display">15 min</strong></label>
        <input id="time-slider" type="range" min="5" max="60" step="5" value="15" />
        <div id="ticks-activity" class="slider-ticks">
          <span>5m</span><span>15m</span><span>30m</span><span>45m</span><span>60m</span>
        </div>
        <div id="ticks-overnight" class="slider-ticks hidden">
          <span>30m</span><span>2u</span><span>4u</span><span>8u</span><span>12u</span>
        </div>
      </section>

      <!-- ── Vervoer (shared) ──────────────────────────── -->
      <section class="control-section">
        <label class="section-label">Vervoersmiddel</label>
        <div class="transport-row">
          <button class="transport-btn active" data-mode="driving">🚗 Auto</button>
          <button class="transport-btn" data-mode="cycling">🚲 Fiets</button>
          <button class="transport-btn" data-mode="walking">🚶 Lopen</button>
        </div>
      </section>

      <!-- ── Activiteiten ──────────────────────────────── -->
      <section id="section-activity" class="control-section">
        <label class="section-label">Wat zoek je? <span class="label-hint">meerdere mogelijk</span></label>
        <div id="category-grid">
          <button class="cat-btn active" data-cat="cafe">☕ Koffie</button>
          <button class="cat-btn" data-cat="restaurant">🍽️ Restaurant</button>
          <button class="cat-btn" data-cat="bar">🍺 Bar</button>
          <button class="cat-btn" data-cat="museum">🏛️ Museum</button>
          <button class="cat-btn" data-cat="park">🌳 Park</button>
          <button class="cat-btn" data-cat="hiking">🥾 Wandelen</button>
          <button class="cat-btn" data-cat="supermarket">🛒 Supermarkt</button>
          <button class="cat-btn" data-cat="library">📚 Bibliotheek</button>
          <button class="cat-btn" data-cat="cinema">🎬 Bioscoop</button>
          <button class="cat-btn" data-cat="bakery">🥐 Bakkerij</button>
          <button class="cat-btn" data-cat="fast_food">🍔 Fastfood</button>
          <button class="cat-btn" data-cat="playground">🛝 Speeltuin</button>
        </div>
      </section>

      <!-- ── Overnachten ───────────────────────────────── -->
      <section id="section-overnight" class="control-section hidden">
        <label class="section-label">Type verblijf</label>
        <div id="acc-type-row">
          <button class="acc-type-btn active" data-type="camping">⛺ Camping</button>
          <button class="acc-type-btn" data-type="hotel">🏨 Hotel / B&B</button>
          <button class="acc-type-btn" data-type="vakantiewoning">🏠 Vakantiehuis</button>
        </div>

        <!-- Sterren (hotel) -->
        <div id="star-filter-section" class="filter-sub hidden">
          <label class="section-label sub">Minimaal sterren</label>
          <div class="btn-row" id="star-btns">
            <button class="filter-opt-btn active" data-value="0">Alle</button>
            <button class="filter-opt-btn" data-value="2">⭐⭐</button>
            <button class="filter-opt-btn" data-value="3">⭐⭐⭐</button>
            <button class="filter-opt-btn" data-value="4">⭐⭐⭐⭐+</button>
          </div>
        </div>

        <!-- Personen (vakantiewoning) -->
        <div id="persons-filter-section" class="filter-sub hidden">
          <label class="section-label sub">Minimaal personen</label>
          <div class="btn-row" id="persons-btns">
            <button class="filter-opt-btn active" data-value="0">Alle</button>
            <button class="filter-opt-btn" data-value="2">2+</button>
            <button class="filter-opt-btn" data-value="4">4+</button>
            <button class="filter-opt-btn" data-value="6">6+</button>
            <button class="filter-opt-btn" data-value="8">8+</button>
          </div>
        </div>

        <!-- Voorzieningen (dynamic chips) -->
        <div id="acc-amenity-section" class="filter-sub">
          <label class="section-label sub">Voorzieningen <span class="label-hint">meerdere mogelijk</span></label>
          <div id="acc-amenity-chips" class="chip-grid"></div>
        </div>
      </section>

      <!-- ── Filters (shared) ──────────────────────────── -->
      <section class="control-section">
        <div class="filters-row">
          <label class="toggle-label" id="open-now-wrapper">
            <input type="checkbox" id="open-now-filter" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            Nu geopend
          </label>
          <div class="sort-wrapper">
            <label for="sort-select">Sorteren:</label>
            <select id="sort-select">
              <option value="distance">Afstand</option>
              <option value="rating">Beoordeling</option>
              <option value="name">Naam</option>
            </select>
          </div>
        </div>
      </section>

      <button id="search-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Zoeken
      </button>

      <!-- ── Resultaten ────────────────────────────────── -->
      <div id="results-header" class="hidden">
        <div class="results-top">
          <span id="results-count"></span>
          <button id="surprise-btn" title="Verras me met een willekeurig resultaat">🎲 Verras me</button>
        </div>
        <span id="radius-info"></span>
      </div>

      <!-- Post-search categoriefilter (activiteit, meerdere cats) -->
      <div id="cat-filter-section" class="hidden">
        <div id="cat-filter-bar"></div>
      </div>

      <ul id="results-list"></ul>
    </aside>

    <main id="map"></main>
  </div>

  <!-- Detail modal -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-content">
      <button id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
